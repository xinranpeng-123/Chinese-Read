<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>童阅星球｜中文分级绘本</title>
<style>
:root{
  --bg:#f7f1e6;
  --card:#fffaf2;
  --ink:#2f241b;
  --muted:#7b6a5a;
  --accent:#9b4f32;
  --line:#eadcc9;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  color:var(--ink);
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
}
.page{
  max-width:1120px;
  margin:0 auto;
  padding:40px 20px 56px;
}
header{margin-bottom:28px}
h1{
  margin:0 0 10px;
  font-size:clamp(36px,6vw,64px);
  letter-spacing:.04em;
}
.intro{
  margin:0;
  color:var(--muted);
  font-size:clamp(16px,2.2vw,20px);
  line-height:1.7;
}
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin:0 0 16px;
}
.section-title{
  margin:0;
  font-size:24px;
}
.status{
  color:var(--muted);
  font-size:14px;
}
.shelf{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:22px;
}
.book{
  display:block;
  text-decoration:none;
  color:inherit;
  background:var(--card);
  border:1px solid var(--line);
  border-radius:22px;
  overflow:hidden;
  box-shadow:0 12px 30px rgba(70,45,25,.12);
  transition:transform .16s ease,box-shadow .16s ease;
}
.book:hover{
  transform:translateY(-3px);
  box-shadow:0 16px 36px rgba(70,45,25,.16);
}
.cover{
  width:100%;
  aspect-ratio:4/5;
  background:#eadcc9;
  overflow:hidden;
}
.cover img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.book-info{padding:15px 16px 18px}
.book-title{
  margin:0 0 6px;
  font-size:24px;
  font-weight:850;
}
.book-meta{
  margin:0 0 12px;
  color:var(--muted);
  font-size:14px;
}
.button{
  display:inline-block;
  padding:7px 13px;
  border-radius:999px;
  background:var(--accent);
  color:white;
  font-size:14px;
  font-weight:800;
}
.empty{
  background:var(--card);
  border:1px dashed var(--line);
  border-radius:20px;
  padding:18px;
  color:var(--muted);
  line-height:1.7;
}
.empty code{
  background:#f1e6d8;
  color:var(--ink);
  padding:2px 5px;
  border-radius:6px;
}
footer{
  margin-top:42px;
  color:var(--muted);
  font-size:13px;
}
</style>
</head>
<body>
<div class="page">
  <header>
    <h1>童阅星球</h1>
    <p class="intro">海外儿童中文分级绘本。先从一小本开始。</p>
  </header>

  <main>
    <div class="topbar">
      <h2 class="section-title">绘本书架</h2>
      <div id="status" class="status">正在读取书架……</div>
    </div>

    <section id="shelf" class="shelf"></section>
  </main>

  <footer>© 童阅星球</footer>
</div>

<script>
const shelf = document.getElementById("shelf");
const statusEl = document.getElementById("status");

initLibrary();

async function initLibrary() {
  try {
    const res = await fetch("books/books.json", { cache: "no-store" });
    if (!res.ok) throw new Error("没有找到 books/books.json");
    const books = await res.json();

    if (!Array.isArray(books) || books.length === 0) {
      renderEmpty("books/books.json 已读取，但里面没有书。");
      return;
    }

    renderBooks(books);
  } catch (err) {
    renderEmpty(
      "书架没有读取到书本列表。请在 books/ 下面放一个 books.json。"
    );
  }
}

function renderBooks(books) {
  statusEl.textContent = `${books.length} 本`;
  shelf.innerHTML = books.map(book => {
    const title = escapeHtml(book.title || "未命名绘本");
    const level = escapeHtml(book.level || "");
    const type = escapeHtml(book.type || "");
    const theme = escapeHtml(book.theme || "");
    const cover = escapeAttr(book.cover || "");
    const url = escapeAttr(book.url || "#");

    const meta = [level, type, theme].filter(Boolean).join("｜");

    return `
      <a class="book" href="${url}">
        <div class="cover">
          <img src="${cover}" alt="《${title}》封面" loading="lazy">
        </div>
        <div class="book-info">
          <h3 class="book-title">${title}</h3>
          <p class="book-meta">${meta || "中文分级绘本"}</p>
          <span class="button">开始阅读</span>
        </div>
      </a>
    `;
  }).join("");
}

function renderEmpty(message) {
  statusEl.textContent = "未读取到书本";
  shelf.innerHTML = `
    <div class="empty">
      <b>${escapeHtml(message)}</b><br>
      需要新建文件：<code>books/books.json</code><br><br>
      示例：<br>
      <code>[
        {"title":"过年","level":"L3","type":"民俗故事","theme":"春节","cover":"books/guonian-l3/images/cover-bg.png","url":"books/guonian-l3/"},
        {"title":"面包","level":"L1","type":"认知识字","theme":"大小","cover":"books/mianbao-l1/images/cover-bg.png","url":"books/mianbao-l1/"}
      ]</code>
    </div>
  `;
}

function escapeHtml(value) {
  return String(value).replace(/[&<>'"]/g, ch => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    "'": "&#39;",
    '"': "&quot;"
  }[ch]));
}

function escapeAttr(value) {
  return escapeHtml(value).replace(/`/g, "&#96;");
}
</script>
</body>
</html>
