<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>会变色的小章鱼</title>
<style>
  :root{
    --bg:#f3fbff;
    --ink:#263238;
    --muted:#6b7b88;
    --panel:#ffffffcc;
    --accent:#5aa9c8;
  }
  *{box-sizing:border-box}
  body{margin:0;background:linear-gradient(#eefaff,#fff8ec);font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei",Arial,sans-serif;color:var(--ink)}
  .app{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px;gap:12px}
  .reader-header{width:min(1180px,100%);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px}
  .shelf{justify-self:start;border:0;border-radius:999px;background:#fff;color:#426b80;padding:9px 16px;font-weight:700;box-shadow:0 2px 12px #9fc7d633;cursor:pointer}
  .book-title{justify-self:center;font-weight:800;font-size:20px;letter-spacing:.04em;color:#2f596b}
  .controls{justify-self:end;display:flex;align-items:center;gap:8px;background:#ffffffaa;border-radius:999px;padding:6px 8px;box-shadow:0 2px 12px #9fc7d633}
  .controls button{border:0;border-radius:999px;background:#e7f5fb;color:#2f596b;padding:8px 12px;font-weight:700;cursor:pointer}
  .controls button:disabled{opacity:.35;cursor:not-allowed}
  #pageIndicator{min-width:64px;text-align:center;font-size:14px;color:#526b76;font-weight:700}
  .stage{width:min(1180px,100%);display:flex;justify-content:center;align-items:center;flex:1}
  .page{position:relative;width:100%;background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 12px 35px #46768a30;isolation:isolate}
  .page.cover,.page.literacy{max-width:820px;aspect-ratio:4/3}
  .page.spread{max-width:1180px;aspect-ratio:2/1}
  .page img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:-1}
  .page.spread img{object-fit:cover}
  .page::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,#ffffff22,#ffffff05);pointer-events:none;z-index:-1}
  .text{position:absolute;white-space:pre-line;font-weight:800;letter-spacing:.06em;line-height:1.45;color:#2c3033;text-shadow:0 1px 0 #fff,0 2px 10px #ffffffaa}
  .cover-title{top:9%;left:7%;right:7%;text-align:center;font-size:clamp(34px,7vw,76px);font-weight:900;color:#2d6b85;letter-spacing:.08em}
  .cover-title span:nth-child(1){color:#397aa8}.cover-title span:nth-child(2){color:#71963b}.cover-title span:nth-child(3){color:#e8734e}.cover-title span:nth-child(4){color:#6a5fa0}.cover-title span:nth-child(5){color:#298c91}.cover-title span:nth-child(6){color:#e38142}.cover-title span:nth-child(7){color:#d96078}
  .right.top{top:18%;right:9%;font-size:clamp(28px,4vw,54px)}
  .right.mid{top:39%;right:10%;font-size:clamp(28px,4vw,54px)}
  .left.mid{top:38%;left:10%;font-size:clamp(28px,4vw,54px)}
  .center.mid{top:34%;left:25%;right:25%;text-align:center;font-size:clamp(30px,4.3vw,58px)}
  .top.center{top:10%;left:0;right:0;text-align:center;font-size:clamp(32px,5vw,64px);color:#2d6b85}
  .em-red{color:#d95a48}
  .literacy-card{position:absolute;inset:8% 9%;background:rgba(255,255,255,.54);border-radius:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px;backdrop-filter:blur(1px)}
  .literacy h1{margin:0;color:#2d6b85;font-size:clamp(32px,5vw,58px);letter-spacing:.12em}
  .word-row{display:flex;gap:clamp(24px,5vw,70px);justify-content:center;align-items:center}
  .word{font-size:clamp(42px,8vw,86px);font-family:"Noto Serif SC","SimSun",serif;color:#153142;font-weight:700}
  .footer-note{width:min(1180px,100%);font-size:12px;color:#6b7b88;text-align:center}
  @media (max-width:720px){
    .app{padding:10px;gap:8px}
    .reader-header{grid-template-columns:1fr auto;grid-template-rows:auto auto;gap:8px}
    .shelf{grid-column:1;grid-row:1;justify-self:start;padding:8px 12px}
    .controls{grid-column:2;grid-row:1;justify-self:end;padding:4px 5px;gap:4px}
    .controls button{padding:7px 9px;font-size:13px}
    #pageIndicator{min-width:48px;font-size:12px}
    .book-title{grid-column:1/3;grid-row:2;justify-self:center;font-size:16px;max-width:100%;text-align:center}
    .page{border-radius:12px}
    .page.cover,.page.literacy{max-width:100%;aspect-ratio:4/3}
    .page.spread{max-width:100%;aspect-ratio:2/1}
    .cover-title{font-size:clamp(26px,8vw,44px)}
    .right.top,.right.mid,.left.mid,.center.mid,.top.center{font-size:clamp(18px,5.5vw,34px)}
    .center.mid{left:16%;right:16%;top:30%}
    .literacy-card{gap:12px}
    .word-row{gap:18px}.word{font-size:clamp(28px,10vw,52px)}
  }
</style>
</head>
<body>
<div class="app">
  <header class="reader-header">
    <button class="shelf" onclick="goHome()">书架</button>
    <div class="book-title">会变色的小章鱼</div>
    <nav class="controls">
      <button id="prevBtn" onclick="prevPage()">上一页</button>
      <span id="pageIndicator"></span>
      <button id="nextBtn" onclick="nextPage()">下一页</button>
    </nav>
  </header>
  <main class="stage"><div id="page" class="page"></div></main>
  <div class="footer-note">文字由网页叠加，图片本身可替换；适合继续做点读、换字和导出版本。</div>
</div>
<script>
const pages = [
  {kind:'cover', img:'assets/cover.png', text:'会变色的小章鱼'},
  {kind:'spread', img:'assets/gray.png', text:'灰色的小章鱼', pos:'right top'},
  {kind:'spread', img:'assets/green.png', text:'绿色的小章鱼', pos:'right mid', color:'#4d6f2f'},
  {kind:'spread', img:'assets/red.png', text:'红色的小章鱼', pos:'left mid', redFirst:true},
  {kind:'spread', img:'assets/yellow.png', text:'黄色的小章鱼', pos:'left mid', color:'#3b2b22'},
  {kind:'spread', img:'assets/fish.png', text:'大鱼来了。', pos:'left mid'},
  {kind:'spread', img:'assets/hide.png', text:'大鱼一只\n小章鱼都找不到！', pos:'center mid'},
  {kind:'spread', img:'assets/final.png', text:'会变色的小章鱼', pos:'top center'},
  {kind:'literacy', img:'assets/cover.png'}
];
let index=0;
function titleSpans(str){return [...str].map(ch=>`<span>${ch}</span>`).join('')}
function render(){
  const p=pages[index];
  const el=document.getElementById('page');
  el.className='page '+p.kind;
  if(p.kind==='literacy'){
    el.innerHTML=`<img src="${p.img}" alt=""/><section class="literacy-card"><h1>认一认</h1><div class="word-row"><span class="word">小</span><span class="word">章</span><span class="word">鱼</span></div><div class="word-row"><span class="word">灰</span><span class="word">绿</span><span class="word">红</span><span class="word">黄</span></div><div class="word-row"><span class="word">大</span><span class="word">色</span></div></section>`;
  } else if(p.kind==='cover'){
    el.innerHTML=`<img src="${p.img}" alt=""/><div class="text cover-title">${titleSpans(p.text)}</div>`;
  } else {
    let text=p.redFirst ? `<span class="em-red">红色</span>的小章鱼` : p.text;
    let style=p.color?`style="color:${p.color}"`:'';
    el.innerHTML=`<img src="${p.img}" alt=""/><div class="text ${p.pos}" ${style}>${text}</div>`;
  }
  document.getElementById('pageIndicator').textContent=`${index+1}/${pages.length}`;
  document.getElementById('prevBtn').disabled=index===0;
  document.getElementById('nextBtn').textContent=index===pages.length-2?'最后页':(index===pages.length-1?'完成':'下一页');
  document.getElementById('nextBtn').disabled=index===pages.length-1;
}
function nextPage(){if(index<pages.length-1){index++;render()}}
function prevPage(){if(index>0){index--;render()}}
function goHome(){index=0;render()}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')nextPage();if(e.key==='ArrowLeft')prevPage()});
render();
</script>
</body>
</html>
