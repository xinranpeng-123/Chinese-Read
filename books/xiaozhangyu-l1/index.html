<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>会变色的小章鱼</title>
<style>
  :root{
    --page-bg:#f7fbfd;
    --paper:#fffdf8;
    --ink:#26343b;
    --ui:#40687a;
    --ui-soft:#eaf6fb;
    --shadow:0 10px 30px rgba(58,105,125,.18);
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;background:linear-gradient(#eefaff,#fff8ef);color:var(--ink)}
  body{font-family:"PingFang SC","Noto Sans SC","Microsoft YaHei",Arial,sans-serif}
  .reader{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px;gap:12px}
  .reader-header{width:min(1180px,100%);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px}
  .shelf{justify-self:start;border:0;border-radius:999px;background:#fff;color:var(--ui);padding:9px 16px;font-weight:700;box-shadow:0 2px 12px rgba(96,150,170,.22);cursor:pointer}
  .book-title{justify-self:center;font-size:20px;font-weight:700;letter-spacing:.04em;color:#2f596b;white-space:nowrap}
  .controls{justify-self:end;display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.82);border-radius:999px;padding:6px 8px;box-shadow:0 2px 12px rgba(96,150,170,.22)}
  .controls button{border:0;border-radius:999px;background:var(--ui-soft);color:var(--ui);padding:8px 12px;font-weight:700;cursor:pointer}
  .controls button:disabled{opacity:.35;cursor:not-allowed}
  #pageNo{min-width:58px;text-align:center;font-size:14px;color:#526b76;font-weight:700}
  .stage{width:min(1180px,100%);flex:1;display:flex;align-items:center;justify-content:center}
  .page{position:relative;width:100%;background:var(--paper);overflow:hidden;box-shadow:var(--shadow);isolation:isolate}
  .cover,.literacy{max-width:820px;aspect-ratio:4/3;border-radius:18px}
  .spread{max-width:1180px;aspect-ratio:2/1;border-radius:18px}
  .page img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:-2}
  .story-text{
    position:absolute;
    white-space:pre-line;
    font-family:"LXGW WenKai","Kaiti SC","STKaiti","KaiTi","Noto Serif SC",serif;
    font-weight:600;
    letter-spacing:.08em;
    line-height:1.55;
    color:#26343b;
    text-shadow:0 1px 0 rgba(255,255,255,.86),0 2px 12px rgba(255,255,255,.55);
  }
  .cover-title{top:9%;left:6%;right:6%;text-align:center;font-size:clamp(32px,6.4vw,72px);font-weight:700;color:#2b6b86;letter-spacing:.08em}
  .pos-right-top{top:18%;right:10%;font-size:clamp(28px,4.2vw,54px)}
  .pos-right-mid{top:36%;right:10%;font-size:clamp(28px,4.2vw,54px)}
  .pos-left-mid{top:36%;left:10%;font-size:clamp(28px,4.2vw,54px)}
  .pos-center{top:28%;left:18%;right:18%;text-align:center;font-size:clamp(30px,4.4vw,58px)}
  .pos-top-center{top:10%;left:0;right:0;text-align:center;font-size:clamp(32px,5vw,62px);color:#2b6b86}
  .literacy-panel{position:absolute;inset:8% 9%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;background:rgba(255,255,255,.42);border-radius:22px}
  .literacy h1{margin:0;font-family:"LXGW WenKai","Kaiti SC","STKaiti","KaiTi","Noto Serif SC",serif;font-size:clamp(30px,5vw,56px);letter-spacing:.14em;color:#2b6b86;font-weight:600}
  .word-row{display:flex;justify-content:center;align-items:center;gap:clamp(24px,5vw,70px)}
  .word{font-family:"LXGW WenKai","Kaiti SC","STKaiti","KaiTi","Noto Serif SC",serif;font-size:clamp(40px,7.6vw,82px);font-weight:600;color:#173241}
  @media (max-width:720px){
    .reader{padding:10px;gap:8px}
    .reader-header{grid-template-columns:1fr auto;grid-template-rows:auto auto;gap:8px}
    .shelf{grid-column:1;grid-row:1;justify-self:start;padding:8px 12px}
    .controls{grid-column:2;grid-row:1;justify-self:end;padding:4px 5px;gap:4px}
    .controls button{padding:7px 9px;font-size:13px}
    #pageNo{min-width:48px;font-size:12px}
    .book-title{grid-column:1/3;grid-row:2;justify-self:center;font-size:16px;text-align:center}
    .cover,.literacy,.spread{max-width:100%;border-radius:12px}
    .cover-title{font-size:clamp(24px,8vw,42px)}
    .pos-right-top,.pos-right-mid,.pos-left-mid,.pos-center,.pos-top-center{font-size:clamp(18px,5.5vw,34px)}
    .pos-center{left:12%;right:12%;top:26%}
    .literacy-panel{gap:12px}
    .word-row{gap:18px}.word{font-size:clamp(28px,10vw,52px)}
  }
</style>
</head>
<body>
<div class="reader">
  <header class="reader-header">
    <button class="shelf" id="homeBtn">书架</button>
    <div class="book-title">会变色的小章鱼</div>
    <nav class="controls" aria-label="翻页">
      <button id="prevBtn">上一页</button>
      <span id="pageNo"></span>
      <button id="nextBtn">下一页</button>
    </nav>
  </header>

  <main class="stage">
    <section id="page" class="page"></section>
  </main>
</div>

<script>
const pages = [
  {type:'cover', image:'images/cover-bg.png', text:'会变色的小章鱼', pos:'cover-title'},
  {type:'spread', image:'images/p01-gray.png', text:'灰色的小章鱼', pos:'pos-right-top'},
  {type:'spread', image:'images/p02-green.png', text:'绿色的小章鱼', pos:'pos-right-mid'},
  {type:'spread', image:'images/p03-red.png', text:'红色的小章鱼', pos:'pos-left-mid'},
  {type:'spread', image:'images/p04-yellow.png', text:'黄色的小章鱼', pos:'pos-left-mid'},
  {type:'spread', image:'images/p05-fish.png', text:'大鱼来了。', pos:'pos-left-mid'},
  {type:'spread', image:'images/p06-hide.png', text:'大鱼一只\n小章鱼都找不到！', pos:'pos-center'},
  {type:'spread', image:'images/p07-final.png', text:'会变色的小章鱼', pos:'pos-top-center'},
  {type:'literacy', image:'images/cover-bg.png'}
];
let current = 0;
const pageEl = document.getElementById('page');
const pageNo = document.getElementById('pageNo');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const homeBtn = document.getElementById('homeBtn');

function render(){
  const p = pages[current];
  pageEl.className = `page ${p.type}`;
  if(p.type === 'literacy'){
    pageEl.innerHTML = `
      <img src="${p.image}" alt="" />
      <div class="literacy-panel">
        <h1>认一认</h1>
        <div class="word-row"><span class="word">小</span><span class="word">章</span><span class="word">鱼</span></div>
        <div class="word-row"><span class="word">灰</span><span class="word">绿</span><span class="word">红</span><span class="word">黄</span></div>
        <div class="word-row"><span class="word">大</span><span class="word">色</span></div>
      </div>`;
  } else {
    pageEl.innerHTML = `<img src="${p.image}" alt="" /><div class="story-text ${p.pos}">${p.text}</div>`;
  }
  pageNo.textContent = `${current + 1}/${pages.length}`;
  prevBtn.disabled = current === 0;
  nextBtn.disabled = current === pages.length - 1;
  nextBtn.textContent = current === pages.length - 2 ? '最后页' : (current === pages.length - 1 ? '完成' : '下一页');
}
prevBtn.addEventListener('click', () => { if(current > 0){ current--; render(); } });
nextBtn.addEventListener('click', () => { if(current < pages.length - 1){ current++; render(); } });
homeBtn.addEventListener('click', () => { window.location.href='../../index.html'; });
document.addEventListener('keydown', e => {
  if(e.key === 'ArrowLeft' && current > 0){ current--; render(); }
  if(e.key === 'ArrowRight' && current < pages.length - 1){ current++; render(); }
});
render();
</script>
</body>
</html>
