<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>变色龙｜中文分级绘本</title>
<style>
:root {
  --bg:#f7f1e6; --ink:#3a2418; --muted:#7a6454; --paper:#fff9ef; --accent:#8b5a3c;
}
* { box-sizing:border-box; }
body { margin:0; background:var(--bg); color:var(--ink); font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; }
.app { min-height:100vh; display:grid; grid-template-rows:auto 1fr; }
header { max-width:1280px; width:100%; margin:0 auto; padding:12px 16px; display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:12px; }
.shelf-btn { justify-self:start; }
header h1 { margin:0; font-size:20px; justify-self:center; }
.toolbar { justify-self:end; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
button { border:0; border-radius:999px; padding:9px 14px; background:var(--accent); color:white; font-weight:700; cursor:pointer; }
button.secondary { background:#e2d4c3; color:var(--ink); }
button:disabled { opacity:.45; cursor:not-allowed; }
.stage { width:100%; display:flex; justify-content:center; align-items:center; padding:12px 16px 24px; }
.book-page { position:relative; background:var(--paper); overflow:hidden; border-radius:14px; box-shadow:0 14px 38px rgba(74,48,28,.16); }
.book-page.cover, .book-page.literacy { width:min(92vw,620px); aspect-ratio:4/5; }
.book-page.literacy { background:var(--paper); }
.book-page.spread { width:min(96vw,1180px); aspect-ratio:8/5; }
.page-bg { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
.text-block {
  position:absolute; width:var(--w); left:var(--x); top:var(--y);
  color:var(--ink);
  font-family:"Source Han Serif SC","Noto Serif SC","STSong","Songti SC","SimSun",serif;
  font-size:clamp(19px,2.2vw,33px);
  line-height:1.7; letter-spacing:.01em;
  text-shadow:0 1px 0 rgba(255,255,255,.72), 0 0 8px rgba(255,247,232,.78);
  cursor:pointer; user-select:text; padding:.12em .2em; border-radius:10px;
}
.cover-title {
  font-family:"STKaiti","Kaiti SC","DFKai-SB","KaiTi","Source Han Serif SC","Noto Serif SC",serif !important;
  font-size:clamp(46px,7vw,78px) !important; font-weight:700; letter-spacing:.12em;
  text-align:center; color:#642a1a;
  text-shadow:0 1px 0 rgba(255,246,230,.78), 0 0 10px rgba(255,250,243,.9);
}
.text-block:hover,.text-block.active { background:rgba(255,245,205,.42); outline:2px solid rgba(139,90,60,.18); }
.literacy-title {
  position:absolute; left:0; top:10.5%; width:100%; text-align:center; color:#642a1a;
  font-family:"STKaiti","Kaiti SC","DFKai-SB","KaiTi","Source Han Serif SC","Noto Serif SC",serif;
  font-size:clamp(30px,5vw,56px); font-weight:700; letter-spacing:.1em;
}
.target-char { text-align:center; font-family:"Source Han Serif SC","Noto Serif SC","Songti SC","SimSun",serif; }
.target-char .pinyin { display:block; font-size:clamp(18px,2.6vw,30px); color:var(--muted); margin-bottom:.22em; font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; }
.target-char .hanzi { display:block; font-size:clamp(58px,9vw,80px); line-height:1.05; font-weight:800; }
.page-indicator { color:var(--muted); font-size:14px; }
@media (max-width:720px){
  header { grid-template-columns:1fr auto; grid-template-rows:auto auto; align-items:center; padding:10px 12px; gap:8px; }
  .shelf-btn { grid-column:1; grid-row:1; justify-self:start; }
  .toolbar { grid-column:2; grid-row:1; justify-self:end; }
  header h1 { grid-column:1/3; grid-row:2; justify-self:center; text-align:center; font-size:16px; }
  button { padding:8px 12px; }
  .stage { padding:8px 10px 16px; }
}
</style>
</head>
<body>
<div class="app">
  <header>
    <button class="secondary shelf-btn" id="homeBtn">书架</button>
    <h1 id="bookTitle"></h1>
    <div class="toolbar">
      <button id="prevBtn" class="secondary">上一页</button>
      <span id="pageIndicator" class="page-indicator"></span>
      <button id="nextBtn">下一页</button>
    </div>
  </header>
  <main class="stage"><section id="bookPage" class="book-page"></section></main>
</div>
<script>
const BOOK = {
  id: 'bianselong-l1',
  title: '变色龙',
  level: 'L1',
  pages: [
    {id:'cover', type:'cover', background:'images/cover-bg.jpg', textBlocks:[{text:'变色龙', x:18, y:11, w:64, className:'cover-title'}]},
    {id:'spread-01', type:'spread', background:'images/spread-01-bg.jpg', textBlocks:[{text:'绿色的小变色龙', x:60, y:20, w:32}]},
    {id:'spread-02', type:'spread', background:'images/spread-02-bg.jpg', textBlocks:[{text:'红色的小变色龙', x:9, y:20, w:34}]},
    {id:'spread-03', type:'spread', background:'images/spread-03-bg.jpg', textBlocks:[{text:'黄色的小变色龙', x:9, y:20, w:34}]},
    {id:'spread-04', type:'spread', background:'images/spread-04-bg.jpg', textBlocks:[{text:'小鸟来了。', x:9, y:35, w:30}]},
    {id:'spread-05', type:'spread', background:'images/spread-05-bg.jpg', textBlocks:[{text:'小鸟一只小变色龙都找不到！', x:21, y:48, w:58}]},
    {id:'spread-06', type:'spread', background:'images/spread-06-bg.jpg', textBlocks:[{text:'会变色的小变色龙', x:9, y:17, w:38}]},
    {id:'literacy-target', type:'literacy', background:'', title:'本集识字目标', textBlocks:[
      {char:'变', pinyin:'biàn', x:22, y:30, w:18, className:'target-char'},
      {char:'色', pinyin:'sè', x:42, y:30, w:18, className:'target-char'},
      {char:'龙', pinyin:'lóng', x:62, y:30, w:18, className:'target-char'},
      {char:'红', pinyin:'hóng', x:22, y:56, w:18, className:'target-char'},
      {char:'黄', pinyin:'huáng', x:42, y:56, w:18, className:'target-char'},
      {char:'绿', pinyin:'lǜ', x:62, y:56, w:18, className:'target-char'}
    ]}
  ]
};
let currentIndex = 0;
let currentAudio = null;
const bookTitle = document.getElementById('bookTitle');
const pageEl = document.getElementById('bookPage');
const indicator = document.getElementById('pageIndicator');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const homeBtn = document.getElementById('homeBtn');
bookTitle.textContent = `${BOOK.title}｜L1`;
homeBtn.addEventListener('click',()=>{window.location.href='../../index.html';});
prevBtn.addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; renderPage(); } });
nextBtn.addEventListener('click', () => { if (currentIndex < BOOK.pages.length - 1) { currentIndex++; renderPage(); } });
document.addEventListener('keydown', (event) => { if (event.key === 'ArrowLeft') prevBtn.click(); if (event.key === 'ArrowRight') nextBtn.click(); });
function renderPage() {
  const page = BOOK.pages[currentIndex];
  pageEl.className = `book-page ${page.type === 'cover' ? 'cover' : page.type === 'spread' ? 'spread' : 'literacy'}`;
  indicator.textContent = `${currentIndex + 1} / ${BOOK.pages.length}`;
  prevBtn.disabled = currentIndex === 0;
  nextBtn.disabled = currentIndex === BOOK.pages.length - 1;
  nextBtn.textContent = currentIndex === BOOK.pages.length - 2 ? '最后页' : '下一页';
  const bg = page.type === "literacy" ? "" : `<img class="page-bg" src="${page.background}" alt="" />`;
  let blocks = '';
  if (page.type === 'literacy') blocks += `<div class="literacy-title">${page.title || '本集识字目标'}</div>`;
  blocks += page.textBlocks.map(block => renderTextBlock(block, page)).join('');
  pageEl.innerHTML = bg + blocks;
  pageEl.querySelectorAll('[data-audio-text]').forEach(el => el.addEventListener('click', () => handleRead(el)));
}
function renderTextBlock(block, page) {
  const style = `--x:${block.x}%; --y:${block.y}%; --w:${block.w}%;`;
  if (page.type === 'literacy') {
    return `<div class="text-block target-char" style="${style}" data-audio-text="${block.char}"><span class="pinyin">${block.pinyin}</span><span class="hanzi">${block.char}</span></div>`;
  }
  const text = escapeHtml(block.text);
  return `<div class="text-block ${block.className || ''}" style="${style}" data-audio-text="${text}">${text}</div>`;
}
function handleRead(el) {
  document.querySelectorAll('.text-block.active').forEach(x => x.classList.remove('active'));
  el.classList.add('active');
  const text = el.dataset.audioText;
  if (window.speechSynthesis) {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN';
    u.rate = 0.82;
    speechSynthesis.speak(u);
  }
}
function escapeHtml(value) {
  return String(value).replace(/[&<>'"]/g, ch => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    "'":'&#39;',
    '"':'&quot;'
  }[ch]));
}
renderPage();
</script>
</body>
</html>
