<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>会变色的小变色龙</title>
<style>
  :root{
    --paper:#fffdf8;
    --ink:#26343b;
    --ui:#40687a;
    --ui-soft:#eaf6fb;
    --shadow:0 10px 30px rgba(58,105,125,.18);
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;background:linear-gradient(#eefaff,#fff8ef);color:var(--ink)}
  body{font-family:"PingFang SC","Noto Sans SC","Microsoft YaHei",Arial,sans-serif}
  .reader{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px;gap:12px}
  .reader-header{width:min(1180px,100%);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px}
  .shelf{justify-self:start;border:0;border-radius:999px;background:#fff;color:var(--ui);padding:9px 16px;font-weight:700;box-shadow:0 2px 12px rgba(96,150,170,.22);cursor:pointer}
  .book-title{justify-self:center;font-size:20px;font-weight:700;letter-spacing:.04em;color:#2f596b;white-space:nowrap}
  .controls{justify-self:end;display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.82);border-radius:999px;padding:6px 8px;box-shadow:0 2px 12px rgba(96,150,170,.22)}
  .controls button{border:0;border-radius:999px;background:var(--ui-soft);color:var(--ui);padding:8px 12px;font-weight:700;cursor:pointer}
  .controls button:disabled{opacity:.35;cursor:not-allowed}
  #pageNo{min-width:58px;text-align:center;font-size:14px;color:#526b76;font-weight:700}
  .stage{width:min(1180px,100%);flex:1;display:flex;align-items:center;justify-content:center}
  .page{position:relative;width:100%;background:var(--paper);overflow:hidden;box-shadow:var(--shadow);isolation:isolate}
  .cover,.literacy{max-width:820px;aspect-ratio:4/3;border-radius:18px}
  .spread{max-width:1180px;aspect-ratio:2/1;border-radius:18px}
  .page img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:var(--paper);z-index:-2}
  .story-text{
    position:absolute;
    white-space:pre-line;
    font-family:"LXGW WenKai","Kaiti SC","STKaiti","KaiTi","Noto Serif SC",serif;
    font-weight:600;
    letter-spacing:.08em;
    line-height:1.55;
    color:#26343b;
    text-shadow:0 1px 0 rgba(255,255,255,.9),0 2px 12px rgba(255,255,255,.65);
  }
  .cover-title{top:8%;left:6%;right:6%;text-align:center;font-size:clamp(34px,6.2vw,68px);font-weight:700;color:#2b6b86;letter-spacing:.08em}
  .pos-right-top{top:16%;right:9%;font-size:clamp(32px,4.6vw,56px)}
  .pos-left-top{top:16%;left:9%;font-size:clamp(32px,4.6vw,56px)}
  .pos-left-mid{top:38%;left:9%;font-size:clamp(32px,4.6vw,56px)}
  .pos-center-top{top:12%;left:8%;right:8%;text-align:center;font-size:clamp(28px,4vw,46px)}
  .pos-top-center{top:10%;left:0;right:0;text-align:center;font-size:clamp(34px,5vw,60px);color:#2b6b86}
  .literacy-panel{position:absolute;inset:9% 8%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;background:rgba(255,255,255,.28);border-radius:22px}
  .literacy h1{margin:0;font-family:"LXGW WenKai","Kaiti SC","STKaiti","KaiTi","Noto Serif SC",serif;font-size:clamp(30px,5vw,54px);letter-spacing:.14em;color:#2b6b86;font-weight:600}
  .word-row{display:flex;justify-content:center;align-items:center;gap:clamp(24px,4.4vw,64px);flex-wrap:wrap}
  .word{font-family:"LXGW WenKai","Kaiti SC","STKaiti","KaiTi","Noto Serif SC",serif;font-size:clamp(40px,7.2vw,80px);font-weight:600;color:#173241}
  @media (max-width:720px){
    .reader{padding:10px;gap:8px}
    .reader-header{grid-template-columns:1fr auto;grid-template-rows:auto auto;gap:8px}
    .shelf{grid-column:1;grid-row:1;justify-self:start;padding:8px 12px}
    .controls{grid-column:2;grid-row:1;justify-self:end;padding:4px 5px;gap:4px}
    .controls button{padding:7px 9px;font-size:13px}
    #pageNo{min-width:48px;font-size:12px}
    .book-title{grid-column:1/3;grid-row:2;justify-self:center;font-size:16px;text-align:center}
    .cover,.literacy,.spread{max-width:100%;border-radius:12px}
    .cover-title{font-size:clamp(24px,8vw,42px)}
    .pos-right-top,.pos-left-top,.pos-left-mid,.pos-top-center{font-size:clamp(20px,5.4vw,34px)}
    .pos-center-top{font-size:clamp(18px,4.4vw,28px);left:8%;right:8%}
    .literacy-panel{gap:14px}
    .word-row{gap:18px}
    .word{font-size:clamp(28px,10vw,52px)}
  }
</style>
</head>
<body>
<div class="reader">
  <header class="reader-header">
    <button class="shelf" id="homeBtn">书架</button>
    <div class="book-title">会变色的小变色龙</div>
    <nav class="controls" aria-label="翻页">
      <button id="prevBtn">上一页</button>
      <span id="pageNo"></span>
      <button id="nextBtn">下一页</button>
    </nav>
  </header>
  <main class="stage">
    <section id="page" class="page"></section>
  </main>
</div>
<script>
const pages = [
  {type:'cover', image:'images/cover-bg.jpg', text:'会变色的小变色龙', pos:'cover-title'},
  {type:'spread', image:'images/p01-green.jpg', text:'绿色的小变色龙', pos:'pos-right-top'},
  {type:'spread', image:'images/p02-red.jpg', text:'红色的小变色龙', pos:'pos-left-top'},
  {type:'spread', image:'images/p03-yellow.jpg', text:'黄色的小变色龙', pos:'pos-left-top'},
  {type:'spread', image:'images/p04-bird.jpg', text:'大鸟来了。', pos:'pos-left-mid'},
  {type:'spread', image:'images/p05-hide.jpg', text:'大鸟一只小变色龙都找不到！', pos:'pos-center-top'},
  {type:'spread', image:'images/p06-final.jpg', text:'会变色的小变色龙', pos:'pos-top-center'},
  {type:'literacy', image:'images/literacy-bg.jpg'}
];
let current = 0;
const pageEl = document.getElementById('page');
const pageNo = document.getElementById('pageNo');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const homeBtn = document.getElementById('homeBtn');
function render(){
  const p = pages[current];
  pageEl.className = `page ${p.type}`;
  if(p.type === 'literacy'){
    pageEl.innerHTML = `
      <img src="${p.image}" alt="" />
      <div class="literacy-panel">
        <h1>本集识字目标</h1>
        <div class="word-row"><span class="word">会</span><span class="word">变</span><span class="word">色</span><span class="word">小</span><span class="word">龙</span></div>
        <div class="word-row"><span class="word">绿</span><span class="word">红</span><span class="word">黄</span><span class="word">鸟</span></div>
      </div>`;
  } else {
    pageEl.innerHTML = `<img src="${p.image}" alt="" /><div class="story-text ${p.pos}">${p.text}</div>`;
  }
  pageNo.textContent = `${current + 1}/${pages.length}`;
  prevBtn.disabled = current === 0;
  nextBtn.disabled = current === pages.length - 1;
  nextBtn.textContent = current >= pages.length - 2 ? '最后页' : '下一页';
}
prevBtn.addEventListener('click', ()=>{if(current>0){current--;render();}});
nextBtn.addEventListener('click', ()=>{if(current<pages.length-1){current++;render();}});
homeBtn.addEventListener('click', ()=>{window.location.href='../../index.html';});
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowLeft' && current>0){current--;render();}
  if(e.key==='ArrowRight' && current<pages.length-1){current++;render();}
});
render();
</script>
</body>
</html>
