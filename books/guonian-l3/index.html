<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>中文分级绘本</title>
<style>
:root{--bg:#f7f1e6;--ink:#3a2418;--muted:#7a6454;--paper:#fff9ef;--accent:#8b5a3c}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
.app{min-height:100vh;display:grid;grid-template-rows:auto 1fr}
header{max-width:1280px;width:100%;margin:0 auto;padding:12px 16px;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:10px}
header h1{margin:0;font-size:20px;text-align:center}
.nav-left,.toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.nav-left{justify-content:flex-start}.toolbar{justify-content:flex-end}
a.nav-button,button{border:0;border-radius:999px;padding:9px 14px;background:var(--accent);color:white;font-weight:700;cursor:pointer;text-decoration:none;font-size:14px}
a.nav-button.secondary,button.secondary{background:#e2d4c3;color:var(--ink)}
button:disabled{opacity:.45;cursor:not-allowed}
.stage{width:100%;display:flex;justify-content:center;align-items:center;padding:12px 16px 24px}
.book-page{position:relative;container-type:inline-size;background:var(--paper);overflow:hidden;border-radius:14px;box-shadow:0 14px 38px rgba(74,48,28,.16)}
.book-page.cover,.book-page.literacy{width:min(92vw,620px);aspect-ratio:4/5}
.book-page.spread{width:min(96vw,1180px);aspect-ratio:8/5}
.page-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.text-block{position:absolute;width:var(--w);left:var(--x);top:var(--y);color:var(--ink);font-family:"Source Han Serif SC","Noto Serif SC","STSong","Songti SC","SimSun",serif;font-size:clamp(10px,2.55cqw,32px);line-height:1.48;letter-spacing:.01em;text-shadow:0 1px 0 rgba(255,255,255,.72),0 0 8px rgba(255,247,232,.78);cursor:pointer;user-select:text;padding:.1em .18em;border-radius:10px}
.cover-title{font-family:"STKaiti","Kaiti SC","DFKai-SB","KaiTi","Source Han Serif SC","Noto Serif SC",serif!important;font-size:clamp(42px,12cqw,116px)!important;font-weight:700;letter-spacing:.22em;text-align:center;color:#642a1a;text-shadow:0 1px 0 rgba(255,246,230,.78),0 0 10px rgba(255,250,243,.9)}
.story-text{font-size:clamp(10px,2.55cqw,32px)}
.size-large{font-size:clamp(48px,14cqw,150px);font-weight:800}
.size-medium{font-size:clamp(36px,10cqw,110px);font-weight:800}
.size-small{font-size:clamp(28px,7.2cqw,82px);font-weight:800}
.text-block:hover,.text-block.active{background:rgba(255,245,205,.42);outline:2px solid rgba(139,90,60,.18)}
.literacy-title{position:absolute;left:0;top:10.5%;width:100%;text-align:center;color:#642a1a;font-family:"STKaiti","Kaiti SC","DFKai-SB","KaiTi","Source Han Serif SC","Noto Serif SC",serif;font-size:clamp(22px,6cqw,56px);font-weight:700;letter-spacing:.1em}
.target-char{text-align:center;font-family:"Source Han Serif SC","Noto Serif SC","Songti SC","SimSun",serif}
.target-char .pinyin{display:block;font-size:clamp(12px,3.6cqw,30px);color:var(--muted);margin-bottom:.22em;font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
.target-char .hanzi{display:block;font-size:clamp(36px,11cqw,98px);line-height:1.05;font-weight:800}
.page-indicator{color:var(--muted);font-size:14px;min-width:46px;text-align:center}
.loading,.error{padding:24px;color:var(--muted)}
.hidden{display:none!important}
@media (max-width:760px){header{grid-template-columns:1fr;justify-items:center}header h1{font-size:16px}.nav-left,.toolbar{justify-content:center}a.nav-button,button{padding:8px 12px;font-size:13px}}
</style>
</head>
<body>
<div class="app">
<header>
  <div class="nav-left">
    <a id="homeLink" class="nav-button secondary" href="../../">← 书架</a>
    <a id="prevBookLink" class="nav-button secondary hidden" href="#">上一本</a>
  </div>
  <h1 id="bookTitle">中文分级绘本</h1>
  <div class="toolbar">
    <button id="prevPageBtn" class="secondary">上一页</button>
    <span id="pageIndicator" class="page-indicator"></span>
    <button id="nextPageBtn">下一页</button>
    <a id="nextBookLink" class="nav-button hidden" href="#">下一本</a>
  </div>
</header>
<main class="stage"><section id="bookPage" class="book-page"><div class="loading">正在加载绘本……</div></section></main>
</div>

<script>
let BOOK=null, LIBRARY=[], currentIndex=0, currentAudio=null;
const bookTitle=document.getElementById("bookTitle");
const pageEl=document.getElementById("bookPage");
const indicator=document.getElementById("pageIndicator");
const prevPageBtn=document.getElementById("prevPageBtn");
const nextPageBtn=document.getElementById("nextPageBtn");
const prevBookLink=document.getElementById("prevBookLink");
const nextBookLink=document.getElementById("nextBookLink");

init();

async function init(){
  try{
    const [bookRes, libraryRes]=await Promise.allSettled([
      fetch("data/pages.json",{cache:"no-store"}),
      fetch("../books.json",{cache:"no-store"})
    ]);
    if(bookRes.status!=="fulfilled" || !bookRes.value.ok) throw new Error("无法读取 data/pages.json");
    BOOK=await bookRes.value.json();

    if(libraryRes.status==="fulfilled" && libraryRes.value.ok){
      LIBRARY=await libraryRes.value.json();
      if(!Array.isArray(LIBRARY)) LIBRARY=[];
    }

    document.title=`${BOOK.title}｜中文分级绘本`;
    bookTitle.textContent=`${BOOK.title}｜${BOOK.level}`;
    renderPage();
  }catch(err){
    pageEl.className="book-page spread";
    pageEl.innerHTML=`<div class="error">绘本加载失败：${escapeHtml(err.message)}<br>请确认 data/pages.json 和 ../books.json 已上传。</div>`;
  }
}

prevPageBtn.onclick=()=>{if(BOOK && currentIndex>0){currentIndex--;renderPage()}};
nextPageBtn.onclick=()=>{if(BOOK && currentIndex<BOOK.pages.length-1){currentIndex++;renderPage()}};
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft") prevPageBtn.click();
  if(e.key==="ArrowRight" && !nextPageBtn.disabled) nextPageBtn.click();
});

function renderPage(){
  const page=BOOK.pages[currentIndex];
  const isFirst=currentIndex===0;
  const isLast=currentIndex===BOOK.pages.length-1;

  pageEl.className=`book-page ${page.type==="cover"?"cover":page.type==="spread"?"spread":"literacy"}`;
  indicator.textContent=`${currentIndex+1} / ${BOOK.pages.length}`;

  prevPageBtn.disabled=isFirst;
  nextPageBtn.disabled=isLast;
  nextPageBtn.textContent=isLast ? "最后页" : "下一页";

  updateBookNav(isFirst,isLast);

  let html=`<img class="page-bg" src="${page.background}" alt="">`;
  if(page.type==="literacy") html+=`<div class="literacy-title">${escapeHtml(page.title||"本集识字目标")}</div>`;
  html+=page.textBlocks.map(block=>renderBlock(block,page)).join("");
  pageEl.innerHTML=html;
  pageEl.querySelectorAll("[data-audio-text]").forEach(el=>el.onclick=()=>readText(el));
}

function updateBookNav(isFirst,isLast){
  const currentFolder=getCurrentBookFolder();
  const currentBookIndex=LIBRARY.findIndex(book=>{
    const urlFolder=getBookFolderFromUrl(book.url);
    return book.id===BOOK.id || urlFolder===BOOK.id || urlFolder===currentFolder;
  });

  const prevBook=currentBookIndex>0 ? LIBRARY[currentBookIndex-1] : null;
  const nextBook=currentBookIndex>=0 && currentBookIndex<LIBRARY.length-1 ? LIBRARY[currentBookIndex+1] : null;

  if(isFirst && prevBook){
    prevBookLink.href=toRelativeBookUrl(prevBook.url);
    prevBookLink.textContent=`上一本：${prevBook.title||""}`;
    prevBookLink.classList.remove("hidden");
  }else{
    prevBookLink.classList.add("hidden");
  }

  if(isLast && nextBook){
    nextBookLink.href=toRelativeBookUrl(nextBook.url);
    nextBookLink.textContent=`下一本：${nextBook.title||""}`;
    nextBookLink.classList.remove("hidden");
  }else{
    nextBookLink.classList.add("hidden");
  }
}

function getCurrentBookFolder(){
  const parts=location.pathname.split("/").filter(Boolean);
  const last=parts[parts.length-1] || "";
  if(last==="index.html") return parts[parts.length-2] || "";
  return last;
}

function getBookFolderFromUrl(url){
  const cleaned=normaliseUrl(url);
  const parts=cleaned.split("/").filter(Boolean);
  return parts[parts.length-1] || "";
}

function toRelativeBookUrl(url){
  const folder=getBookFolderFromUrl(url);
  return folder ? `../${folder}/` : "#";
}

function renderBlock(block,page){
  const style=`--x:${block.x}%;--y:${block.y}%;--w:${block.w}%;`;
  if(page.type==="literacy"){
    return `<div class="text-block target-char" style="${style}" data-audio="${escapeAttr(block.audio||"")}" data-audio-text="${escapeAttr(block.char||block.text||"")}"><span class="pinyin">${escapeHtml(block.pinyin||"")}</span><span class="hanzi">${escapeHtml(block.char||block.text||"")}</span></div>`;
  }
  return `<div class="text-block ${escapeAttr(block.className||"")}" style="${style}" data-audio="${escapeAttr(block.audio||"")}" data-audio-text="${escapeAttr(block.text||"")}">${escapeHtml(block.text||"")}</div>`;
}

function readText(el){
  document.querySelectorAll(".text-block.active").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");
  const src=el.dataset.audio, text=el.dataset.audioText;
  if(currentAudio){currentAudio.pause();currentAudio=null}
  if(window.speechSynthesis) speechSynthesis.cancel();
  if(src){currentAudio=new Audio(src);currentAudio.play();return}
  if(window.speechSynthesis && text){
    const u=new SpeechSynthesisUtterance(text);
    u.lang="zh-CN"; u.rate=.82; speechSynthesis.speak(u);
  }
}

function normaliseUrl(url){return String(url||"").replace(/^\.\//,"").replace(/^\/+/, "").replace(/\/index\.html$/, "/").replace(/\/$/, "");}
function escapeHtml(value){return String(value).replace(/[&<>'"]/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[ch]));}
function escapeAttr(value){return escapeHtml(value).replace(/`/g,"&#96;");}
</script>
</body>
</html>
