<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>过年｜中文分级绘本</title>
<style>
:root{--bg:#f7f1e6;--ink:#3a2418;--muted:#7a6454;--paper:#fff9ef;--accent:#8b5a3c}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
.app{min-height:100vh;display:grid;grid-template-rows:auto 1fr}
header{max-width:1280px;width:100%;margin:0 auto;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
header h1{margin:0;font-size:20px}
.toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
button{border:0;border-radius:999px;padding:9px 14px;background:var(--accent);color:white;font-weight:700;cursor:pointer}
button.secondary{background:#e2d4c3;color:var(--ink)}
button:disabled{opacity:.45;cursor:not-allowed}
.stage{width:100%;display:flex;justify-content:center;align-items:center;padding:12px 16px 24px}
.book-page{position:relative;container-type:inline-size;background:var(--paper);overflow:hidden;border-radius:14px;box-shadow:0 14px 38px rgba(74,48,28,.16)}
.book-page.cover,.book-page.literacy{width:min(92vw,620px);aspect-ratio:4/5}
.book-page.spread{width:min(96vw,1180px);aspect-ratio:8/5}
.page-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.text-block{position:absolute;width:var(--w);left:var(--x);top:var(--y);color:var(--ink);font-family:"Source Han Serif SC","Noto Serif SC","STSong","Songti SC","SimSun",serif;font-size:clamp(10px,2.55cqw,32px);line-height:1.48;letter-spacing:.01em;text-shadow:0 1px 0 rgba(255,255,255,.72),0 0 8px rgba(255,247,232,.78);cursor:pointer;user-select:text;padding:.1em .18em;border-radius:10px}
.cover-title{font-family:"STKaiti","Kaiti SC","DFKai-SB","KaiTi","Source Han Serif SC","Noto Serif SC",serif!important;font-size:clamp(42px,12cqw,116px)!important;font-weight:700;letter-spacing:.22em;text-align:center;color:#642a1a;text-shadow:0 1px 0 rgba(255,246,230,.78),0 0 10px rgba(255,250,243,.9)}
.text-block:hover,.text-block.active{background:rgba(255,245,205,.42);outline:2px solid rgba(139,90,60,.18)}
.literacy-title{position:absolute;left:0;top:10.5%;width:100%;text-align:center;color:#642a1a;font-family:"STKaiti","Kaiti SC","DFKai-SB","KaiTi","Source Han Serif SC","Noto Serif SC",serif;font-size:clamp(22px,6cqw,56px);font-weight:700;letter-spacing:.1em}
.target-char{text-align:center;font-family:"Source Han Serif SC","Noto Serif SC","Songti SC","SimSun",serif}
.target-char .pinyin{display:block;font-size:clamp(12px,3.6cqw,30px);color:var(--muted);margin-bottom:.22em;font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
.target-char .hanzi{display:block;font-size:clamp(36px,11cqw,98px);line-height:1.05;font-weight:800}
.page-indicator{color:var(--muted);font-size:14px}
.loading,.error{padding:24px;color:var(--muted)}
@media (max-width:700px) and (orientation:portrait){header h1{font-size:16px}button{padding:8px 12px;font-size:13px}}
</style>
</head>
<body>
<div class="app">
<header><h1 id="bookTitle">过年｜L3</h1><div class="toolbar"><button id="prevBtn" class="secondary">上一页</button><span id="pageIndicator" class="page-indicator"></span><button id="nextBtn">下一页</button></div></header>
<main class="stage"><section id="bookPage" class="book-page"><div class="loading">正在加载绘本……</div></section></main>
</div>
<script>
let BOOK=null,currentIndex=0,currentAudio=null;
const bookTitle=document.getElementById("bookTitle"),pageEl=document.getElementById("bookPage"),indicator=document.getElementById("pageIndicator"),prevBtn=document.getElementById("prevBtn"),nextBtn=document.getElementById("nextBtn");
async function init(){
  try{const res=await fetch("data/pages.json");if(!res.ok)throw new Error("无法读取 data/pages.json");BOOK=await res.json();bookTitle.textContent=`${BOOK.title}｜${BOOK.level}`;renderPage();}
  catch(err){pageEl.className="book-page spread";pageEl.innerHTML=`<div class="error">绘本数据加载失败：${escapeHtml(err.message)}<br>请确认 data/pages.json 已上传，并通过网站地址访问。</div>`;}
}
prevBtn.onclick=()=>{if(currentIndex>0){currentIndex--;renderPage()}};
nextBtn.onclick=()=>{if(BOOK&&currentIndex<BOOK.pages.length-1){currentIndex++;renderPage()}};
document.addEventListener("keydown",e=>{if(e.key==="ArrowLeft")prevBtn.click();if(e.key==="ArrowRight")nextBtn.click()});
function renderPage(){
 const page=BOOK.pages[currentIndex];
 pageEl.className=`book-page ${page.type==="cover"?"cover":page.type==="spread"?"spread":"literacy"}`;
 indicator.textContent=`${currentIndex+1} / ${BOOK.pages.length}`;
 prevBtn.disabled=currentIndex===0;nextBtn.disabled=currentIndex===BOOK.pages.length-1;
 let html=`<img class="page-bg" src="${page.background}" alt="">`;
 if(page.type==="literacy")html+=`<div class="literacy-title">${page.title||"本集识字目标"}</div>`;
 html+=page.textBlocks.map(b=>renderBlock(b,page)).join("");
 pageEl.innerHTML=html;
 pageEl.querySelectorAll("[data-audio-text]").forEach(el=>el.onclick=()=>readText(el));
}
function renderBlock(b,page){
 const style=`--x:${b.x}%;--y:${b.y}%;--w:${b.w}%;`;
 if(page.type==="literacy")return `<div class="text-block target-char" style="${style}" data-audio="${b.audio||""}" data-audio-text="${b.char}"><span class="pinyin">${b.pinyin}</span><span class="hanzi">${b.char}</span></div>`;
 return `<div class="text-block ${b.className||""}" style="${style}" data-audio="${b.audio||""}" data-audio-text="${escapeHtml(b.text)}">${escapeHtml(b.text)}</div>`;
}
function readText(el){
 document.querySelectorAll(".text-block.active").forEach(x=>x.classList.remove("active"));el.classList.add("active");
 const src=el.dataset.audio,text=el.dataset.audioText;
 if(currentAudio){currentAudio.pause();currentAudio=null} if(window.speechSynthesis)speechSynthesis.cancel();
 if(src){currentAudio=new Audio(src);currentAudio.play();return}
 if(window.speechSynthesis&&text){const u=new SpeechSynthesisUtterance(text);u.lang="zh-CN";u.rate=.82;speechSynthesis.speak(u)}
}
function escapeHtml(v){return String(v).replace(/[&<>'"]/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[ch]))}
init();
</script>
</body>
</html>
