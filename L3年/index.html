<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>过年｜中文分级绘本</title>
<style>
:root {
  --bg:#f7f1e6; --ink:#3a2418; --muted:#7a6454; --paper:#fff9ef; --accent:#8b5a3c;
}
* { box-sizing:border-box; }
body { margin:0; background:var(--bg); color:var(--ink); font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; }
.app { min-height:100vh; display:grid; grid-template-rows:auto 1fr; }
header { max-width:1280px; width:100%; margin:0 auto; padding:12px 16px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
header h1 { margin:0; font-size:20px; }
.toolbar { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
button { border:0; border-radius:999px; padding:9px 14px; background:var(--accent); color:white; font-weight:700; cursor:pointer; }
button.secondary { background:#e2d4c3; color:var(--ink); }
button:disabled { opacity:.45; cursor:not-allowed; }
.stage { width:100%; display:flex; justify-content:center; align-items:center; padding:12px 16px 24px; }
.book-page { position:relative; background:var(--paper); overflow:hidden; border-radius:14px; box-shadow:0 14px 38px rgba(74,48,28,.16); }
.book-page.cover, .book-page.literacy { width:min(92vw,620px); aspect-ratio:4/5; }
.book-page.spread { width:min(96vw,1180px); aspect-ratio:8/5; }
.page-bg { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
.text-block {
  position:absolute; width:var(--w); left:var(--x); top:var(--y);
  color:var(--ink);
  font-family:"Source Han Serif SC","Noto Serif SC","STSong","Songti SC","SimSun",serif;
  font-size:clamp(19px,2.2vw,33px);
  line-height:1.7;
  letter-spacing:.01em;
  text-shadow:0 1px 0 rgba(255,255,255,.72), 0 0 8px rgba(255,247,232,.78);
  cursor:pointer; user-select:text; padding:.12em .2em; border-radius:10px;
}
.cover-title {
  font-family:"STKaiti","Kaiti SC","DFKai-SB","KaiTi","Source Han Serif SC","Noto Serif SC",serif !important;
  font-size:clamp(52px,8vw,96px) !important;
  font-weight:700;
  letter-spacing:.22em;
  text-align:center;
  color:#642a1a;
  text-shadow:0 1px 0 rgba(255,246,230,.78), 0 0 10px rgba(255,250,243,.9);
}
.text-block:hover,.text-block.active { background:rgba(255,245,205,.42); outline:2px solid rgba(139,90,60,.18); }
.literacy-title {
  position:absolute; left:0; top:10.5%; width:100%; text-align:center; color:#642a1a;
  font-family:"STKaiti","Kaiti SC","DFKai-SB","KaiTi","Source Han Serif SC","Noto Serif SC",serif;
  font-size:clamp(30px,5vw,56px); font-weight:700; letter-spacing:.1em;
}
.target-char { text-align:center; font-family:"Source Han Serif SC","Noto Serif SC","Songti SC","SimSun",serif; }
.target-char .pinyin {
  display:block; font-size:clamp(18px,2.6vw,30px); color:var(--muted);
  margin-bottom:.22em; font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
}
.target-char .hanzi { display:block; font-size:clamp(58px,9vw,80px); line-height:1.05; font-weight:800; }
.page-indicator { color:var(--muted); font-size:14px; }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1 id="bookTitle"></h1>
    <div class="toolbar">
      <button id="prevBtn" class="secondary">上一页</button>
      <span id="pageIndicator" class="page-indicator"></span>
      <button id="nextBtn">下一页</button>
    </div>
  </header>
  <main class="stage"><section id="bookPage" class="book-page"></section></main>
</div>
<script>
const BOOK = {
  "id": "guonian-l3",
  "title": "过年",
  "level": "L3",
  "type": "folk_story",
  "version": "0.3",
  "pages": [
    {
      "id": "cover",
      "type": "cover",
      "ratio": "4:5",
      "background": "images/cover-bg.png",
      "textBlocks": [
        {
          "id": "title",
          "text": "过年",
          "x": 35,
          "y": 11,
          "w": 30,
          "className": "cover-title",
          "audio": ""
        }
      ]
    },
    {
      "id": "spread-01",
      "type": "spread",
      "ratio": "8:5",
      "background": "images/spread-01-bg.png",
      "textBlocks": [
        {
          "id": "s1",
          "text": "山那边，有一种怪兽叫“年”。",
          "x": 57,
          "y": 21,
          "w": 35,
          "className": "story-text",
          "audio": ""
        },
        {
          "id": "s2",
          "text": "冬天快结束的时候，年就醒了。",
          "x": 57,
          "y": 34,
          "w": 35,
          "className": "story-text",
          "audio": ""
        }
      ]
    },
    {
      "id": "spread-02",
      "type": "spread",
      "ratio": "8:5",
      "background": "images/spread-02-bg.png",
      "textBlocks": [
        {
          "id": "s1",
          "text": "年下山了。",
          "x": 61,
          "y": 18,
          "w": 31,
          "className": "story-text",
          "audio": ""
        },
        {
          "id": "s2",
          "text": "村子里的人都关上门。",
          "x": 61,
          "y": 30,
          "w": 31,
          "className": "story-text",
          "audio": ""
        },
        {
          "id": "s3",
          "text": "安安和宁宁躲在奶奶身后，偷偷往外看。",
          "x": 61,
          "y": 42,
          "w": 31,
          "className": "story-text",
          "audio": ""
        }
      ]
    },
    {
      "id": "spread-03",
      "type": "spread",
      "ratio": "8:5",
      "background": "images/spread-03-bg.png",
      "textBlocks": [
        {
          "id": "s1",
          "text": "奶奶说：“年怕红色，也怕响。”",
          "x": 56,
          "y": 18,
          "w": 36,
          "className": "story-text",
          "audio": ""
        },
        {
          "id": "s2",
          "text": "爸爸点响了鞭炮，噼里啪啦！",
          "x": 56,
          "y": 31,
          "w": 36,
          "className": "story-text",
          "audio": ""
        },
        {
          "id": "s3",
          "text": "年吓了一大跳，转身就跑。",
          "x": 56,
          "y": 44,
          "w": 36,
          "className": "story-text",
          "audio": ""
        }
      ]
    },
    {
      "id": "spread-04",
      "type": "spread",
      "ratio": "8:5",
      "background": "images/spread-04-bg.png",
      "textBlocks": [
        {
          "id": "s1",
          "text": "天亮了，雪地上有一串大脚印。",
          "x": 70,
          "y": 16,
          "w": 26,
          "className": "story-text",
          "audio": ""
        },
        {
          "id": "s2",
          "text": "大家一起吃饭，屋里暖暖的。",
          "x": 70,
          "y": 29,
          "w": 26,
          "className": "story-text",
          "audio": ""
        },
        {
          "id": "s3",
          "text": "从那以后，这一天就叫“过年”。",
          "x": 70,
          "y": 42,
          "w": 26,
          "className": "story-text",
          "audio": ""
        }
      ]
    },
    {
      "id": "literacy-target",
      "type": "literacy",
      "ratio": "4:5",
      "background": "images/literacy-bg.png",
      "title": "本集识字目标",
      "textBlocks": [
        {
          "id": "char-year",
          "char": "年",
          "pinyin": "nián",
          "text": "年",
          "x": 22,
          "y": 28,
          "w": 20,
          "className": "target-char",
          "audio": ""
        },
        {
          "id": "char-red",
          "char": "红",
          "pinyin": "hóng",
          "text": "红",
          "x": 58,
          "y": 28,
          "w": 20,
          "className": "target-char",
          "audio": ""
        },
        {
          "id": "char-mountain",
          "char": "山",
          "pinyin": "shān",
          "text": "山",
          "x": 22,
          "y": 48,
          "w": 20,
          "className": "target-char",
          "audio": ""
        },
        {
          "id": "char-nai",
          "char": "奶",
          "pinyin": "nǎi",
          "text": "奶",
          "x": 58,
          "y": 48,
          "w": 20,
          "className": "target-char",
          "audio": ""
        },
        {
          "id": "char-lamp",
          "char": "灯",
          "pinyin": "dēng",
          "text": "灯",
          "x": 40,
          "y": 68,
          "w": 20,
          "className": "target-char",
          "audio": ""
        }
      ]
    }
  ],
  "literacyTargets": [
    {
      "char": "年",
      "pinyin": "nián",
      "audio": ""
    },
    {
      "char": "红",
      "pinyin": "hóng",
      "audio": ""
    },
    {
      "char": "山",
      "pinyin": "shān",
      "audio": ""
    },
    {
      "char": "奶",
      "pinyin": "nǎi",
      "audio": ""
    },
    {
      "char": "灯",
      "pinyin": "dēng",
      "audio": ""
    }
  ]
};
let currentIndex = 0;
let currentAudio = null;
const bookTitle = document.getElementById("bookTitle");
const pageEl = document.getElementById("bookPage");
const indicator = document.getElementById("pageIndicator");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
bookTitle.textContent = `${BOOK.title}｜${BOOK.level}`;
prevBtn.addEventListener("click", () => { if (currentIndex > 0) { currentIndex--; renderPage(); } });
nextBtn.addEventListener("click", () => { if (currentIndex < BOOK.pages.length - 1) { currentIndex++; renderPage(); } });
document.addEventListener("keydown", (event) => { if (event.key === "ArrowLeft") prevBtn.click(); if (event.key === "ArrowRight") nextBtn.click(); });

function renderPage() {
  const page = BOOK.pages[currentIndex];
  pageEl.className = `book-page ${page.type === "cover" ? "cover" : page.type === "spread" ? "spread" : "literacy"}`;
  indicator.textContent = `${currentIndex + 1} / ${BOOK.pages.length}`;
  prevBtn.disabled = currentIndex === 0;
  nextBtn.disabled = currentIndex === BOOK.pages.length - 1;
  const bg = `<img class="page-bg" src="${page.background}" alt="" />`;
  let blocks = "";
  if (page.type === "literacy") blocks += `<div class="literacy-title">${page.title || "本集识字目标"}</div>`;
  blocks += page.textBlocks.map(block => renderTextBlock(block, page)).join("");
  pageEl.innerHTML = bg + blocks;
  pageEl.querySelectorAll("[data-audio-text]").forEach(el => el.addEventListener("click", () => handleRead(el)));
}

function renderTextBlock(block, page) {
  const style = `--x:${block.x}%; --y:${block.y}%; --w:${block.w}%;`;
  const audio = block.audio || "";
  if (page.type === "literacy") {
    return `<div class="text-block target-char" style="${style}" data-audio="${audio}" data-audio-text="${block.char}">
      <span class="pinyin">${block.pinyin}</span>
      <span class="hanzi">${block.char}</span>
    </div>`;
  }
  return `<div class="text-block ${block.className || ""}" style="${style}" data-audio="${audio}" data-audio-text="${escapeHtml(block.text)}">${escapeHtml(block.text)}</div>`;
}

function handleRead(el) {
  document.querySelectorAll(".text-block.active").forEach(x => x.classList.remove("active"));
  el.classList.add("active");
  const src = el.dataset.audio;
  const text = el.dataset.audioText;
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  if (src) {
    currentAudio = new Audio(src);
    currentAudio.play();
    return;
  }
  if (window.speechSynthesis && text) {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "zh-CN";
    u.rate = 0.82;
    speechSynthesis.speak(u);
  }
}

function escapeHtml(value) {
  return String(value).replace(/[&<>'"]/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[ch]));
}
renderPage();
</script>
</body>
</html>
